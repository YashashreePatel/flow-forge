services:
  backend:
    build:
      context: ./backend
    environment:
      FLOWFORGE_DB_PATH: /data/flowforge.db
    ports:
      - "8000:8000"
    volumes:
      - flowforge-data:/data
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      FLOWFORGE_DB_PATH: /data/flowforge.db
      FLOWFORGE_WORKER_ID: compose-worker
      FLOWFORGE_TASK_QUEUE: default
    volumes:
      - flowforge-data:/data
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
      - loki
      - jaeger

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  flowforge-data:
  postgres-data:
