apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-frontend
  namespace: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-frontend
  template:
    metadata:
      labels:
        app: flowforge-frontend
    spec:
      containers:
        - name: frontend
          image: flowforge-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://flowforge-api:8000
---
apiVersion: v1
kind: Service
metadata:
  name: flowforge-frontend
  namespace: flowforge
spec:
  selector:
    app: flowforge-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
