apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-api
  namespace: flowforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-api
  template:
    metadata:
      labels:
        app: flowforge-api
    spec:
      containers:
        - name: api
          image: flowforge-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: FLOWFORGE_DB_PATH
              value: /data/flowforge.db
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: flowforge-api
  namespace: flowforge
spec:
  selector:
    app: flowforge-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
